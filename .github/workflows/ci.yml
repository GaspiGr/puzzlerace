name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Análisis y tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Verificar formato
        run: dart format --output=none --set-exit-if-changed lib test
        continue-on-error: true

      - name: Análisis estático
        run: flutter analyze

      - name: Tests
        run: flutter test
